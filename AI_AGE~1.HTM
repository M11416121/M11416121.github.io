<style>
  :root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --accent1:#4f7cff;
    --accent2:#8b5cf6;
    --accent3:#06b6a4;
    --text:#1f2430;
    --sub:#6b7280;
    --border:#e6e9f0;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:"Segoe UI","PingFang TC","Microsoft JhengHei",sans-serif;
    background:linear-gradient(180deg,#eef1fb 0%,#f5f7fb 300px, #f5f7fb 100%);
    color:var(--text);
  }
  header{
    padding:36px 24px 20px;
    text-align:center;
  }
  header h1{
    font-size:28px;
    margin:0 0 8px;
    background:linear-gradient(90deg,var(--accent1),var(--accent2));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    font-weight:800;
    letter-spacing:1px;
  }
  header p{
    margin:0;
    color:var(--sub);
    font-size:14px;
  }
  .container{
    max-width:1200px;
    margin:0 auto;
    padding:0 20px 60px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(340px,1fr));
    gap:24px;
  }
  .section{
    background:var(--card);
    border-radius:16px;
    border:1px solid var(--border);
    box-shadow:0 4px 18px rgba(30,40,80,0.06);
    padding:20px;
    display:flex;
    flex-direction:column;
  }
  .section-title{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:14px;
  }
  .badge{
    width:34px;height:34px;border-radius:10px;
    display:flex;align-items:center;justify-content:center;
    font-size:16px;color:#fff;font-weight:700;
    flex-shrink:0;
  }
  .badge.t1{background:linear-gradient(135deg,var(--accent1),#7aa2ff);}
  .badge.t2{background:linear-gradient(135deg,var(--accent2),#c084fc);}
  .badge.t3{background:linear-gradient(135deg,var(--accent3),#34d399);}
  .section h2{
    font-size:16px;
    margin:0;
  }
  .card{
    border:1px solid var(--border);
    border-radius:12px;
    padding:14px 16px;
    margin-bottom:12px;
    transition:box-shadow .2s, transform .2s;
    background:#fbfcff;
  }
  .card:hover{
    box-shadow:0 6px 16px rgba(30,40,80,0.10);
    transform:translateY(-2px);
  }
  .card:last-child{margin-bottom:0;}
  .card-title{
    font-size:14.5px;
    font-weight:700;
    margin:0 0 6px;
    line-height:1.4;
  }
  .card-title a{
    color:var(--text);
    text-decoration:none;
  }
  .card-title a:hover{
    color:var(--accent1);
    text-decoration:underline;
  }
  .meta{
    display:flex;
    gap:10px;
    font-size:12px;
    color:var(--sub);
    margin-bottom:8px;
    flex-wrap:wrap;
  }
  .meta span.source{
    background:#eef1fb;
    padding:2px 8px;
    border-radius:6px;
    font-weight:600;
    color:#4a5568;
  }
  .summary{
    font-size:13.5px;
    color:#3c4250;
    line-height:1.5;
    margin:0;
  }
  .empty{
    color:var(--sub);
    font-size:14px;
    text-align:center;
    padding:30px 10px;
    font-style:italic;
  }
  footer{
    text-align:center;
    color:var(--sub);
    font-size:12px;
    padding:10px 0 30px;
  }
</style>

function render(){
  const root = document.getElementById("dashboard");
  root.innerHTML = "";
  Object.values(data).forEach(section => {
    const sec = document.createElement("div");
    sec.className = "section";

    const titleRow = document.createElement("div");
    titleRow.className = "section-title";
    titleRow.innerHTML = `<div class="badge ${section.badgeClass}">${section.icon}</div><h2>${section.title}</h2>`;
    sec.appendChild(titleRow);

    if(!section.items || section.items.length === 0){
      const empty = document.createElement("div");
      empty.className = "empty";
      empty.textContent = "本週暫無新消息";
      sec.appendChild(empty);
    } else {
      const sorted = [...section.items].sort((a,b)=> new Date(b.date) - new Date(a.date)).slice(0,5);
      sorted.forEach(item=>{
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <p class="card-title"><a href="${item.url}" target="_blank" rel="noopener">${item.title}</a></p>
          <div class="meta"><span class="source">${item.source}</span><span>${item.date}</span></div>
          <p class="summary">${item.summary}</p>
        `;
        sec.appendChild(card);
      });
    }
    root.appendChild(sec);
  });
}
render();
