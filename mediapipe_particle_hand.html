<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>M11416121的資訊圖</title>
<style>
  :root{
    --bg:#0b0d14;
    --panel-bg: rgba(15,18,28,0.72);
    --accent:#7dd3fc;
    --accent2:#f472b6;
    --text:#e7ecf3;
    --muted:#93a0b4;
  }
  *{ box-sizing:border-box; }
  html,body{
    margin:0; padding:0; height:100%;
    background: radial-gradient(1200px 800px at 50% -10%, #182036 0%, var(--bg) 60%);
    color:var(--text);
    font-family: "Microsoft JhengHei", "Noto Sans TC", "Segoe UI", sans-serif;
    overflow-x:hidden;
  }
  header#top-title{
    text-align:center;
    padding: 14px 10px 10px;
    font-size: clamp(20px, 3.4vw, 34px);
    font-weight:800;
    letter-spacing: 2px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    text-shadow: 0 0 24px rgba(125,211,252,0.25);
  }
  #subtitle{
    text-align:center;
    color: var(--muted);
    font-size: 13px;
    margin-bottom: 10px;
  }
  #main-wrap{
    max-width: 980px;
    margin: 0 auto;
    padding: 0 12px 24px;
  }
  #stage{
    position:relative;
    width:100%;
    aspect-ratio: 4 / 3;
    background:#000;
    border-radius: 16px;
    overflow:hidden;
    box-shadow: 0 10px 40px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
  }
  #stage > *{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
  }
  /* mirror the whole visual stack so it behaves like a selfie mirror */
  #video, #overlay, #particles{
    transform: scaleX(-1);
  }
  video#video{
    object-fit: cover;
    background:#000;
  }
  canvas{
    pointer-events:none;
  }
  #status-banner{
    position:absolute;
    top:0; left:0; right:0;
    display:flex; align-items:center; justify-content:center;
    background: rgba(0,0,0,0.55);
    color: var(--text);
    font-size: 14px;
    padding: 10px 14px;
    z-index: 5;
    text-align:center;
    gap:10px;
  }
  #start-btn{
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border:none; color:#0b0d14; font-weight:700;
    padding: 8px 16px; border-radius:999px; cursor:pointer; font-size:13px;
  }
  #start-btn:hover{ filter:brightness(1.08); }

  #info-panel{
    margin-top: 14px;
    display:grid;
    grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
    gap: 10px;
  }
  .info-card{
    background: var(--panel-bg);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 10px 12px;
    backdrop-filter: blur(6px);
  }
  .info-card .label{
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .info-card .value{
    font-size: 16px;
    font-weight: 700;
    color: var(--text);
    font-variant-numeric: tabular-nums;
  }
  .swatch{
    display:inline-block;
    width:14px; height:14px;
    border-radius: 4px;
    margin-right:6px;
    vertical-align: -2px;
    box-shadow: 0 0 8px currentColor;
  }
  #legend{
    margin-top: 12px;
    font-size: 12px;
    color: var(--muted);
    line-height: 1.6;
    text-align:center;
  }
  #legend b{ color: var(--text); }
</style>
</head>
<body>

<header id="top-title">M11416121的資訊圖</header>
<div id="subtitle">MediaPipe 人體 / 手部即時偵測 &amp; 手勢控制粒子系統</div>

<div id="main-wrap">
  <div id="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
    <canvas id="particles"></canvas>
    <div id="status-banner">
      <span id="status-text">準備載入 MediaPipe 模型…</span>
      <button id="start-btn" style="display:none;">啟動攝影機</button>
    </div>
  </div>

  <div id="info-panel">
    <div class="info-card">
      <div class="label">日期</div>
      <div class="value" id="info-date">--</div>
    </div>
    <div class="info-card">
      <div class="label">時間</div>
      <div class="value" id="info-time">--</div>
    </div>
    <div class="info-card">
      <div class="label">人體偵測</div>
      <div class="value" id="info-pose">未偵測</div>
    </div>
    <div class="info-card">
      <div class="label">右手偵測</div>
      <div class="value" id="info-hand">未偵測</div>
    </div>
    <div class="info-card">
      <div class="label">手勢狀態</div>
      <div class="value" id="info-gesture">--</div>
    </div>
    <div class="info-card">
      <div class="label">張合程度</div>
      <div class="value" id="info-openness">--</div>
    </div>
    <div class="info-card">
      <div class="label">與螢幕距離估計</div>
      <div class="value" id="info-distance">--</div>
    </div>
    <div class="info-card">
      <div class="label">粒子範圍半徑</div>
      <div class="value" id="info-range">--</div>
    </div>
    <div class="info-card">
      <div class="label">目前形狀 / 顏色</div>
      <div class="value"><span class="swatch" id="info-swatch"></span><span id="info-shape">--</span></div>
    </div>
    <div class="info-card">
      <div class="label">握拳次數</div>
      <div class="value" id="info-clench">0</div>
    </div>
    <div class="info-card">
      <div class="label">FPS</div>
      <div class="value" id="info-fps">--</div>
    </div>
  </div>

  <div id="legend">
    伸開右手掌 → 粒子<b>放大散開</b>；握拳 → 粒子<b>縮起聚合</b>，且每次握拳會<b>更換顏色與形狀</b>（愛心／星星／三種隨機圖形）。<br/>
    右手離鏡頭<b>越近</b>，粒子活動範圍<b>越小</b>；離鏡頭越遠，範圍越大。
  </div>
</div>

<script type="module">
import {
  HandLandmarker,
  PoseLandmarker,
  FilesetResolver
} from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/vision_bundle.mjs";

const video = document.getElementById("video");
const overlay = document.getElementById("overlay");
const particlesCanvas = document.getElementById("particles");
const overlayCtx = overlay.getContext("2d");
const pCtx = particlesCanvas.getContext("2d");
const statusText = document.getElementById("status-text");
const startBtn = document.getElementById("start-btn");

const elDate = document.getElementById("info-date");
const elTime = document.getElementById("info-time");
const elPose = document.getElementById("info-pose");
const elHand = document.getElementById("info-hand");
const elGesture = document.getElementById("info-gesture");
const elOpenness = document.getElementById("info-openness");
const elDistance = document.getElementById("info-distance");
const elRange = document.getElementById("info-range");
const elShape = document.getElementById("info-shape");
const elSwatch = document.getElementById("info-swatch");
const elClench = document.getElementById("info-clench");
const elFps = document.getElementById("info-fps");

/* ---------------- date / time clock ---------------- */
function updateClock(){
  const now = new Date();
  elDate.textContent = now.toLocaleDateString('zh-TW', { year:'numeric', month:'2-digit', day:'2-digit', weekday:'short' });
  elTime.textContent = now.toLocaleTimeString('zh-TW', { hour12:false });
}
updateClock();
setInterval(updateClock, 1000);

/* ---------------- skeleton connection tables ---------------- */
const HAND_CONNECTIONS = [
  [0,1],[1,2],[2,3],[3,4],
  [0,5],[5,6],[6,7],[7,8],
  [5,9],[9,10],[10,11],[11,12],
  [9,13],[13,14],[14,15],[15,16],
  [13,17],[17,18],[18,19],[19,20],
  [0,17]
];
const POSE_CONNECTIONS = [
  [11,12],[11,13],[13,15],[12,14],[14,16],
  [11,23],[12,24],[23,24],
  [23,25],[25,27],[27,29],[27,31],[29,31],
  [24,26],[26,28],[28,30],[28,32],[30,32],
  [15,17],[15,19],[15,21],[17,19],
  [16,18],[16,20],[16,22],[18,20]
];

/* ---------------- shape drawing helpers ---------------- */
function heartPath(ctx, cx, cy, size){
  const topCurveHeight = size * 0.3;
  ctx.beginPath();
  ctx.moveTo(cx, cy + topCurveHeight);
  ctx.bezierCurveTo(cx - size/2, cy - topCurveHeight, cx - size, cy + size/3, cx, cy + size);
  ctx.bezierCurveTo(cx + size, cy + size/3, cx + size/2, cy - topCurveHeight, cx, cy + topCurveHeight);
  ctx.closePath();
}
function starPath(ctx, x, y, size){
  const spikes = 5, outerR = size, innerR = size * 0.5;
  let rot = (Math.PI/2) * 3;
  const step = Math.PI / spikes;
  ctx.beginPath();
  ctx.moveTo(x, y - outerR);
  for (let i=0;i<spikes;i++){
    let px = x + Math.cos(rot)*outerR, py = y + Math.sin(rot)*outerR;
    ctx.lineTo(px,py); rot += step;
    px = x + Math.cos(rot)*innerR; py = y + Math.sin(rot)*innerR;
    ctx.lineTo(px,py); rot += step;
  }
  ctx.lineTo(x, y - outerR);
  ctx.closePath();
}
function polygonPath(ctx, x, y, size, sides, rotation=0){
  ctx.beginPath();
  for (let i=0;i<sides;i++){
    const a = rotation + i*(2*Math.PI/sides) - Math.PI/2;
    const px = x + Math.cos(a)*size, py = y + Math.sin(a)*size;
    if (i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
}
function crossPath(ctx, x, y, size){
  const t = size*0.4;
  ctx.beginPath();
  ctx.rect(x - t/2, y - size, t, size*2);
  ctx.rect(x - size, y - t/2, size*2, t);
}
function drawShape(ctx, shape, x, y, size, color, rotation){
  ctx.save();
  ctx.fillStyle = color;
  ctx.shadowColor = color;
  ctx.shadowBlur = 10;
  switch(shape){
    case 'heart':    heartPath(ctx,x,y,size); ctx.fill(); break;
    case 'star':     starPath(ctx,x,y,size); ctx.fill(); break;
    case 'triangle': polygonPath(ctx,x,y,size,3,rotation); ctx.fill(); break;
    case 'diamond':  polygonPath(ctx,x,y,size,4,rotation); ctx.fill(); break;
    case 'hexagon':  polygonPath(ctx,x,y,size,6,rotation); ctx.fill(); break;
    case 'pentagon': polygonPath(ctx,x,y,size,5,rotation); ctx.fill(); break;
    case 'cross':    crossPath(ctx,x,y,size); ctx.fill(); break;
  }
  ctx.restore();
}

/* ---------------- shape / color state ---------------- */
const SHAPE_NAMES_ZH = {
  heart:'愛心', star:'星星', triangle:'三角形', diamond:'菱形',
  hexagon:'六邊形', cross:'十字形', pentagon:'五邊形'
};
function pickRandomN(arr, n){
  const pool = [...arr], out = [];
  for (let i=0;i<n && pool.length;i++){
    out.push(pool.splice(Math.floor(Math.random()*pool.length),1)[0]);
  }
  return out;
}
const extraPool = ['triangle','diamond','hexagon','cross','pentagon'];
const activeShapes = ['heart','star', ...pickRandomN(extraPool, 3)];
let shapeIndex = 0;
function randomColor(){
  const hue = Math.floor(Math.random()*360);
  return `hsl(${hue}, 88%, 62%)`;
}
let particleColor = randomColor();
function updateShapeInfoUI(){
  elShape.textContent = SHAPE_NAMES_ZH[activeShapes[shapeIndex]] || activeShapes[shapeIndex];
  elSwatch.style.background = particleColor;
  elSwatch.style.color = particleColor;
}
updateShapeInfoUI();

/* ---------------- particle system ---------------- */
const NUM_PARTICLES = 160;
const particles = [];
for (let i=0;i<NUM_PARTICLES;i++){
  particles.push({
    angleOffset: Math.random()*Math.PI*2,
    radiusFactor: 0.15 + Math.random()*0.85,
    speedMul: 0.4 + Math.random()*1.2,
    sizeFactor: 0.5 + Math.random()*1.0,
    phase: Math.random()*Math.PI*2,
    spinDir: Math.random() < 0.5 ? -1 : 1
  });
}
let globalRotation = 0;

const MAX_OUTER_RADIUS = 260;
const MIN_OUTER_RADIUS = 70;
const SPAN_NEAR = 0.30;   // hand fills more of frame -> close to screen
const SPAN_FAR  = 0.08;   // hand small in frame -> far from screen

let rawOpenness = 0.5;       // instantaneous 0..1, used for state/trigger logic
let smoothedOpenness = 0.5;  // eased 0..1, used only for visuals
let handState = 'open';
let wasClosed = false;       // latch: must fully close before an open counts as a new cycle
let clenchCount = 0;
let smoothedCenter = { x:null, y:null };
let smoothedOuterRadius = 140;
let smoothedHandSpan = 0.16;
let rightHandVisible = false;

function clamp(v,a,b){ return Math.max(a, Math.min(b, v)); }
function mapRange(v, inMin, inMax, outMin, outMax){
  const t = clamp((v - inMin) / (inMax - inMin), 0, 1);
  return outMin + t*(outMax - outMin);
}
function dist(a,b){
  const dx=a.x-b.x, dy=a.y-b.y, dz=(a.z||0)-(b.z||0);
  return Math.sqrt(dx*dx+dy*dy+dz*dz);
}

// tip-to-wrist distance averaged over the 5 fingertips, normalized by the
// wrist-to-middle-finger-MCP length (palm size). A closed fist gives ~0.9-1.0,
// a fully open hand gives ~1.7-2.0.
function computeOpenness(lm){
  const wrist = lm[0];
  const palmLen = dist(wrist, lm[9]) || 1e-6;
  const tips = [4, 8, 12, 16, 20];
  let sum = 0;
  for (const i of tips) sum += dist(wrist, lm[i]);
  const ratio = (sum / tips.length) / palmLen;
  return clamp((ratio - 1.0) / 0.85, 0, 1);
}

function processHand(handResult, canvasW, canvasH){
  let rightIdx = -1;
  if (handResult.handednesses){
    for (let i=0;i<handResult.handednesses.length;i++){
      // see note above loop(): unmirrored input -> user's right hand reports as "Left"
      if (handResult.handednesses[i][0].categoryName === 'Left'){ rightIdx = i; break; }
    }
    // only one hand visible and it didn't match -> use it anyway to avoid
    // flicker at the classifier's decision boundary
    if (rightIdx === -1 && handResult.landmarks && handResult.landmarks.length === 1){
      rightIdx = 0;
    }
  }
  rightHandVisible = rightIdx !== -1;

  if (rightHandVisible){
    const lm = handResult.landmarks[rightIdx];
    const wrist = lm[0], midMcp = lm[9];
    const handSpan = dist(wrist, midMcp);

    rawOpenness = computeOpenness(lm);
    smoothedOpenness += (rawOpenness - smoothedOpenness) * 0.3;
    smoothedHandSpan += (handSpan - smoothedHandSpan) * 0.2;

    const cx = midMcp.x * canvasW;
    const cy = midMcp.y * canvasH;
    if (smoothedCenter.x === null){ smoothedCenter.x = cx; smoothedCenter.y = cy; }
    smoothedCenter.x += (cx - smoothedCenter.x) * 0.25;
    smoothedCenter.y += (cy - smoothedCenter.y) * 0.25;

    // hysteresis band: below 0.25 = closed, above 0.65 = open, using the raw
    // (unsmoothed) value so the state reacts immediately to the gesture
    const isClosed = rawOpenness < 0.25;
    const isOpen = rawOpenness > 0.65;
    if (isClosed) wasClosed = true;
    if (wasClosed && isOpen){
      // a full close -> open cycle just completed: swap color + shape
      wasClosed = false;
      clenchCount++;
      particleColor = randomColor();
      let next;
      do { next = Math.floor(Math.random()*activeShapes.length); } while (activeShapes.length > 1 && next === shapeIndex);
      shapeIndex = next;
      updateShapeInfoUI();
      elClench.textContent = clenchCount;
    }
    handState = isClosed ? 'closed' : (isOpen ? 'open' : handState);

    elHand.textContent = '偵測到（右手）';
    elGesture.textContent = isClosed ? '握拳' : (isOpen ? '張開' : '半開');
    elOpenness.textContent = (rawOpenness*100).toFixed(0) + '%';
  } else {
    smoothedOpenness += (0.3 - smoothedOpenness) * 0.04;
    elHand.textContent = '未偵測';
    elGesture.textContent = '--';
    elOpenness.textContent = '--';
  }

  const proximityT = mapRange(smoothedHandSpan, SPAN_FAR, SPAN_NEAR, 0, 1); // 0=far,1=near
  const targetOuter = mapRange(proximityT, 0, 1, MAX_OUTER_RADIUS, MIN_OUTER_RADIUS);
  const spreadFactor = mapRange(smoothedOpenness, 0, 1, 0.22, 1);
  const target = targetOuter * spreadFactor;
  smoothedOuterRadius += (target - smoothedOuterRadius) * 0.15;

  elDistance.textContent = rightHandVisible
    ? (proximityT > 0.6 ? '較近' : (proximityT < 0.35 ? '較遠' : '中等'))
    : '--';
  elRange.textContent = Math.round(smoothedOuterRadius) + ' px';
}

function drawParticles(dt){
  const w = particlesCanvas.width, h = particlesCanvas.height;
  pCtx.clearRect(0,0,w,h);

  const cx = smoothedCenter.x ?? w/2;
  const cy = smoothedCenter.y ?? h/2;

  globalRotation += dt * 0.0006;

  for (const p of particles){
    const angle = p.angleOffset + globalRotation * p.speedMul * p.spinDir;
    const wob = Math.sin(performance.now()*0.002 + p.phase) * 5;
    const r = p.radiusFactor * smoothedOuterRadius + wob;
    const x = cx + Math.cos(angle) * r;
    const y = cy + Math.sin(angle) * r * 0.85;
    const size = p.sizeFactor * mapRange(smoothedOpenness, 0, 1, 3.5, 12);
    drawShape(pCtx, activeShapes[shapeIndex], x, y, size, particleColor, angle);
  }

  // draw a soft center glow marker on the palm
  if (smoothedCenter.x !== null){
    pCtx.save();
    pCtx.globalAlpha = 0.35;
    pCtx.fillStyle = particleColor;
    pCtx.shadowColor = particleColor;
    pCtx.shadowBlur = 20;
    pCtx.beginPath();
    pCtx.arc(cx, cy, 6, 0, Math.PI*2);
    pCtx.fill();
    pCtx.restore();
  }
}

/* ---------------- overlay (skeleton) drawing ---------------- */
function drawConnections(ctx, landmarks, connections, w, h, color, lineWidth){
  ctx.strokeStyle = color;
  ctx.lineWidth = lineWidth;
  ctx.beginPath();
  for (const [a,b] of connections){
    const p1 = landmarks[a], p2 = landmarks[b];
    if (!p1 || !p2) continue;
    ctx.moveTo(p1.x*w, p1.y*h);
    ctx.lineTo(p2.x*w, p2.y*h);
  }
  ctx.stroke();
}
function drawLandmarkDots(ctx, landmarks, w, h, color, r){
  ctx.fillStyle = color;
  for (const p of landmarks){
    ctx.beginPath();
    ctx.arc(p.x*w, p.y*h, r, 0, Math.PI*2);
    ctx.fill();
  }
}

/* ---------------- setup MediaPipe ---------------- */
let handLandmarker, poseLandmarker;
let lastVideoTime = -1;

async function setupMediaPipe(){
  statusText.textContent = '正在載入 MediaPipe 模型（需要網路連線）…';
  const vision = await FilesetResolver.forVisionTasks(
    "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.14/wasm"
  );
  handLandmarker = await HandLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numHands: 2
  });
  poseLandmarker = await PoseLandmarker.createFromOptions(vision, {
    baseOptions: {
      modelAssetPath: "https://storage.googleapis.com/mediapipe-models/pose_landmarker/pose_landmarker_lite/float16/1/pose_landmarker_lite.task",
      delegate: "GPU"
    },
    runningMode: "VIDEO",
    numPoses: 1
  });
  statusText.textContent = '模型載入完成，請啟動攝影機';
  startBtn.style.display = 'inline-block';
}

async function startCamera(){
  try{
    statusText.textContent = '請求攝影機權限…';
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { width:{ideal:1280}, height:{ideal:720}, facingMode:'user' },
      audio: false
    });
    video.srcObject = stream;
    await new Promise(res => { video.onloadedmetadata = res; });
    video.play();

    overlay.width = particlesCanvas.width = video.videoWidth;
    overlay.height = particlesCanvas.height = video.videoHeight;

    document.getElementById('status-banner').style.display = 'none';
    requestAnimationFrame(loop);
  } catch(err){
    statusText.textContent = '無法取得攝影機：' + err.message + '（若以 file:// 開啟，請改用本機伺服器，例如 python -m http.server 後以 http://localhost 開啟）';
  }
}

startBtn.addEventListener('click', startCamera);

/* ---------------- main loop ---------------- */
let lastFrameTime = performance.now();
let fpsSmooth = 0;

function loop(now){
  requestAnimationFrame(loop);
  if (!handLandmarker || !poseLandmarker) return;
  if (video.readyState < 2) return;
  if (video.currentTime === lastVideoTime) return;
  lastVideoTime = video.currentTime;

  const dt = now - lastFrameTime;
  lastFrameTime = now;
  const fps = 1000 / dt;
  fpsSmooth += (fps - fpsSmooth) * 0.1;
  elFps.textContent = fpsSmooth.toFixed(0);

  const w = overlay.width, h = overlay.height;
  overlayCtx.clearRect(0,0,w,h);

  const ts = performance.now();
  const handResult = handLandmarker.detectForVideo(video, ts);
  const poseResult = poseLandmarker.detectForVideo(video, ts);

  // draw hands
  // NOTE: the raw camera frame fed into the model is NOT mirrored (only the
  // CSS display is mirrored for a natural selfie view). MediaPipe's handedness
  // label assumes a mirrored input, so on our unmirrored frame the user's
  // actual RIGHT hand is reported as categoryName "Left" (and vice versa).
  if (handResult.landmarks && handResult.landmarks.length){
    handResult.landmarks.forEach((lm, i) => {
      const isRight = handResult.handednesses[i][0].categoryName === 'Left';
      const color = isRight ? '#7dd3fc' : '#f472b6';
      drawConnections(overlayCtx, lm, HAND_CONNECTIONS, w, h, color, 2.5);
      drawLandmarkDots(overlayCtx, lm, w, h, color, 3);
    });
    processHand(handResult, particlesCanvas.width, particlesCanvas.height);
  } else {
    processHand({ handednesses: null, landmarks: null }, particlesCanvas.width, particlesCanvas.height);
  }

  // draw pose skeleton
  if (poseResult.landmarks && poseResult.landmarks.length){
    const lm = poseResult.landmarks[0];
    drawConnections(overlayCtx, lm, POSE_CONNECTIONS, w, h, 'rgba(163,230,53,0.9)', 3);
    drawLandmarkDots(overlayCtx, lm, w, h, 'rgba(163,230,53,0.9)', 3);
    elPose.textContent = '偵測到';
  } else {
    elPose.textContent = '未偵測';
  }

  drawParticles(dt);
}

setupMediaPipe().catch(err => {
  statusText.textContent = '模型載入失敗：' + err.message;
});
</script>
